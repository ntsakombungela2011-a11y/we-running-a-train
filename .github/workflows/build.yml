name: Builds
on:
  workflow_dispatch:

# Declare permissions to allow creating releases and uploading assets.
permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build Android Debug
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout mobile code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.3

      - run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation
        run: dart run build_runner build

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Determine Release Version
        id: version
        run: |
          PUBSPEC_VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "tag=v${PUBSPEC_VERSION}-${SHORT_SHA}-debug" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ steps.version.outputs.tag }}
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Debug Release ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: true
          files: build/app/outputs/flutter-apk/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
